<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>IBA Protocol Ecosystem Map</title>
<desc>The IBA Protocol at the centre connecting GoverningLayer, WitnessBound, AgentialOnChain, SwarmForge and IBA-X</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: system-ui, sans-serif; }
  .label-main { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .label-sub  { font-size: 12px; font-weight: 400; fill: #666; }
  .label-meta { font-size: 11px; font-weight: 400; fill: #999; letter-spacing: 0.05em; }
  .box-purple { fill: #EEEDFE; stroke: #534AB7; }
  .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
  .box-coral  { fill: #FAECE7; stroke: #993C1D; }
  .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
  .text-purple { fill: #3C3489; }
  .text-teal   { fill: #085041; }
  .text-coral  { fill: #712B13; }
  .text-amber  { fill: #633806; }
  .text-sub-purple { fill: #534AB7; }
  .text-sub-teal   { fill: #0F6E56; }
  .text-sub-coral  { fill: #993C1D; }
  .text-sub-amber  { fill: #854F0B; }
  .connector { fill: none; stroke: #ccc; stroke-width: 1; }
  .border { fill: none; stroke: #e0e0e0; stroke-width: 1; stroke-dasharray: 6 4; }
</style>
</defs>

<rect x="30" y="20" width="620" height="480" rx="16" class="border"/>
<text class="label-meta" x="50" y="42">IBA · Intent-Bound Authorization · Patent GB2603013.0 · PCT 150+ Countries</text>

<!-- Centre: IBA Protocol -->
<rect x="240" y="190" width="200" height="70" rx="10" stroke-width="0.5" class="box-purple"/>
<text class="label-main text-purple" x="340" y="218" text-anchor="middle" dominant-baseline="central">IBA Protocol</text>
<text class="label-sub text-sub-purple" x="340" y="240" text-anchor="middle" dominant-baseline="central">Runtime intent enforcement</text>

<!-- GoverningLayer -->
<rect x="60" y="80" width="180" height="64" rx="10" stroke-width="0.5" class="box-teal"/>
<text class="label-main text-teal" x="150" y="106" text-anchor="middle" dominant-baseline="central">GoverningLayer</text>
<text class="label-sub text-sub-teal" x="150" y="128" text-anchor="middle" dominant-baseline="central">Policy engine</text>
<path d="M240 210 L214 143" class="connector" marker-end="url(#arrow)"/>

<!-- WitnessBound -->
<rect x="440" y="80" width="180" height="64" rx="10" stroke-width="0.5" class="box-teal"/>
<text class="label-main text-teal" x="530" y="106" text-anchor="middle" dominant-baseline="central">WitnessBound</text>
<text class="label-sub text-sub-teal" x="530" y="128" text-anchor="middle" dominant-baseline="central">Audit &amp; verification</text>
<path d="M440 210 L466 143" class="connector" marker-end="url(#arrow)"/>

<!-- AgentialOnChain -->
<rect x="60" y="370" width="180" height="64" rx="10" stroke-width="0.5" class="box-coral"/>
<text class="label-main text-coral" x="150" y="396" text-anchor="middle" dominant-baseline="central">AgentialOnChain</text>
<text class="label-sub text-sub-coral" x="150" y="418" text-anchor="middle" dominant-baseline="central">On-chain intent ledger</text>
<path d="M240 240 L214 370" class="connector" marker-end="url(#arrow)"/>

<!-- IBA-X -->
<rect x="440" y="370" width="180" height="64" rx="10" stroke-width="0.5" class="box-amber"/>
<text class="label-main text-amber" x="530" y="396" text-anchor="middle" dominant-baseline="central">IBA-X</text>
<text class="label-sub text-sub-amber" x="530" y="418" text-anchor="middle" dominant-baseline="central">xAI Phoenix reference impl.</text>
<path d="M440 240 L466 370" class="connector" marker-end="url(#arrow)"/>

<!-- SwarmForge -->
<rect x="255" y="370" width="170" height="64" rx="10" stroke-width="0.5" class="box-coral"/>
<text class="label-main text-coral" x="340" y="396" text-anchor="middle" dominant-baseline="central">SwarmForge</text>
<text class="label-sub text-sub-coral" x="340" y="418" text-anchor="middle" dominant-baseline="central">Multi-agent governance</text>
<path d="M340 260 L340 370" class="connector" marker-end="url(#arrow)"/>

<text class="label-meta" x="340" y="498" text-anchor="middle">IntentBound.com · GoverningLayer.com · Jeffrey Williams · IGCP Chiang Mai</text>
</svg>
